<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Flor de Lótus - Sushi Delivery</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <meta name="theme-color" content="#C2185B">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <button id="themeToggle" class="theme-toggle" aria-label="Alternar modo escuro">
            <i class="fas fa-moon"></i>
        </button>
        <div class="logo">
            <i class="fas fa-lotus" style="color: #C2185B; font-size: 2rem;"></i>
            <h1>Flor de Lótus</h1>
        </div>
        <p class="slogan">Culinária Oriental</p>
        <button id="musicToggle" class="music-toggle" aria-label="Tocar música ambiente">
            <i class="fas fa-music"></i>
        </button>

    </header>

    <nav class="filters" aria-label="Navegação do cardápio">
        <button class="filter-btn active" data-section="all">Todos</button>
        <button class="filter-btn" data-section="tradicionais">Tradicionais</button>
        <button class="filter-btn" data-section="especiais">Especiais</button>
        <button class="filter-btn" data-section="combinados">Combinados</button>
    </nav>

    <main>
        <section id="tradicionais">
            <h2>Peças Tradicionais <i class="fas fa-fish"></i></h2>
            <div class="menu-grid" id="tradicionais-grid"></div>
        </section>
        <div class="lotus-divider"><i class="fas fa-lotus"></i></div>

        <section id="especiais">
            <h2>Peças Especiais <i class="fas fa-crown"></i></h2>
            <div class="menu-grid" id="especiais-grid"></div>
        </section>
        <div class="lotus-divider"><i class="fas fa-lotus"></i></div>

        <section id="combinados">
            <h2>Combinados <i class="fas fa-box"></i></h2>
            <div class="menu-grid" id="combinados-grid"></div>
        </section>
    </main>

    <!-- Modais -->
    <div id="itemModal" class="cart-modal">
        <div class="cart-modal-content item-detail">
            <div class="cart-header">
                <h3 id="modalNome"></h3>
                <i class="fas fa-times" onclick="closeItemModal()"></i>
            </div>
            <img id="modalPhoto" src="" alt="Foto do prato" style="width:100%; height:auto; border-radius:8px;">
            <p id="modalDesc"></p>
            <p id="modalPreco"></p>
            <label>Sabor:</label>
            <select id="flavorSelect">
                <option value="salmao">Salmão</option>
                <option value="camarao">Camarão</option>
                <option value="kani">Kani</option>
            </select>
            <div class="quantity">
                <label>Quantidade:</label>
                <button onclick="changeModalQty(-1)">–</button>
                <span id="modalQty">1</span>
                <button onclick="changeModalQty(1)">+</button>
            </div>
            <button class="btn-add" onclick="addFromModal()">Adicionar ao Carrinho</button>
        </div>
    </div>

    <div id="cartModal" class="cart-modal" role="dialog" aria-modal="true">
        <div class="cart-modal-content">
            <div class="cart-header">
                <h3>Seu Pedido</h3>
                <i class="fas fa-times" onclick="toggleCartModal()"></i>
            </div>
            <div id="cartItemsList" class="cart-items"></div>
            <div class="cart-total">
                <strong>Total: R$ <span id="modalTotal">0.00</span></strong>
                <div class="agendamento">
                    <label for="agendamentoData">Data para retirada/entrega:</label>
                    <input type="datetime-local" id="agendamentoData" min="">
                </div>
            </div>
            <button class="btn-finalizar" id="finalizarBtn" onclick="finalizarPedido()">
                <i class="fab fa-whatsapp"></i> Finalizar via WhatsApp
            </button>
        </div>
    </div>

    <div id="historyModal" class="cart-modal" role="dialog" aria-modal="true">
        <div class="cart-modal-content">
            <div class="cart-header">
                <h3>Histórico de Pedidos</h3>
                <i class="fas fa-times" onclick="toggleHistoryModal()"></i>
            </div>
            <div id="historyList"></div>
        </div>
    </div>

    <!-- Barra fixa do carrinho -->
    <footer class="cart-bar" id="cartBar">
        <div class="cart-info" onclick="toggleCartModal()">
            <i class="fas fa-shopping-basket"></i>
            <span id="cartCount">0</span> itens | Total: R$ <span id="cartTotal">0.00</span>
            <i class="fas fa-chevron-up" id="cartArrow"></i>
            <div class="pontos-info">
                <i class="fas fa-star"></i> <span id="pontosDisplay">0</span> pontos
            </div>
        </div>
    </footer>

    <audio id="ambientMusic" loop preload="none">
        <source src="audio/happy.mp3" type="audio/mpeg">
    </audio>

    <div id="floatCartAnimation" class="float-animation"></div>

    <script src="app.js"></script>
</body>
</html>
