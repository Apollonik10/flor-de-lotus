<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Cardápio digital da Flor de Lótus — Culinária Oriental artesanal em Cajazeiras, PB." />
  <meta name="theme-color" content="#d98f7a" />

  <title>Cardápio — Flor de Lótus</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="images/icons/icon-192.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Styles -->
  <link rel="stylesheet" href="./styles.css">
  <link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="./pwa-patch.css">
</head>
<body>

  <!-- ═══════════════════════════════
       BARRA DE TOPO — fixa
  ═══════════════════════════════ -->
  <header class="top-bar" role="banner">

    <a href="../page-lotus/index.html" class="top-bar-brand" aria-label="Ir para página inicial">
      <span class="brand-name">Flor de <em>Lótus</em></span>
      <span class="brand-sub" aria-hidden="true">Cardápio</span>
    </a>

    <div class="search-wrap" role="search">
      <label for="searchInput" class="sr-only">Buscar no cardápio</label>
      <input
        id="searchInput"
        type="search"
        class="search-input"
        placeholder="Buscar prato..."
        autocomplete="off"
        spellcheck="false"
        aria-label="Buscar prato"
      >
      <i class="fas fa-magnifying-glass search-icon" aria-hidden="true"></i>
    </div>

    <div class="top-bar-actions" role="toolbar" aria-label="Ações do cardápio">

      <!-- Favoritos -->
      <button class="btn-icon" id="btnFav" aria-label="Ver favoritos" aria-pressed="false">
        <i class="far fa-heart" aria-hidden="true"></i>
        <span class="badge" id="favCount" aria-label="Favoritos" role="status"></span>
      </button>

      <!-- Carrinho -->
      <button class="btn-icon" id="btnCart" aria-label="Abrir carrinho" aria-expanded="false">
        <i class="fas fa-bag-shopping" aria-hidden="true"></i>
        <span class="badge" id="cartCount" aria-label="Itens no carrinho" role="status"></span>
      </button>

    </div>
  </header>

  <!-- ═══════════════════════════════
       FILTROS DE CATEGORIA — sticky
  ═══════════════════════════════ -->
  <nav id="filterBar" class="filter-bar" aria-label="Filtrar por categoria" role="navigation">
    <!-- preenchido por app.js -->
  </nav>

  <!-- ═══════════════════════════════
       CONTEÚDO PRINCIPAL
  ═══════════════════════════════ -->
  <main id="mainContent" class="main-content" aria-label="Itens do cardápio">
    <!-- preenchido por app.js -->
  </main>

  <!-- Estado vazio (sem resultados de busca) -->
  <div class="empty-state" id="emptyState" role="status" aria-live="polite">
    <i class="fas fa-bowl-rice" aria-hidden="true"></i>
    <p>Nenhum item encontrado.<br>Tente outra busca.</p>
  </div>

  <!-- ═══════════════════════════════
       OVERLAY (modal + drawer)
  ═══════════════════════════════ -->
  <div class="modal-overlay" id="modalOverlay" role="presentation" aria-hidden="true"></div>

  <!-- ═══════════════════════════════
       MODAL DE DETALHE (bottom sheet)
  ═══════════════════════════════ -->
  <article
    class="item-modal"
    id="itemModal"
    role="dialog"
    aria-modal="true"
    aria-label="Detalhes do item"
  >
    <!-- preenchido dinamicamente por app.js -->
  </article>

  <!-- ═══════════════════════════════
       DRAWER DO CARRINHO
  ═══════════════════════════════ -->
  <aside
    class="cart-drawer"
    id="cartDrawer"
    role="dialog"
    aria-modal="true"
    aria-label="Seu carrinho"
  >
    <header class="cart-header">
      <h2 class="cart-title">Seu <em>pedido</em></h2>
      <button class="btn-icon" onclick="document.getElementById('cartDrawer').classList.remove('open');document.getElementById('modalOverlay').classList.remove('open');document.body.style.overflow=''" aria-label="Fechar carrinho">
        <i class="fas fa-times" aria-hidden="true"></i>
      </button>
    </header>

    <!-- Itens do carrinho -->
    <div class="cart-items" id="cartItems" role="list" aria-label="Itens adicionados"></div>

    <!-- Estado vazio do carrinho -->
    <div class="cart-empty" id="cartEmpty" role="status">
      <i class="fas fa-bag-shopping" aria-hidden="true"></i>
      <p>Seu carrinho está vazio.<br>Adicione itens do cardápio.</p>
    </div>

    <!-- Resumo e botão de pedido -->
    <div class="cart-summary" id="cartSummary" style="display:none">
      <div class="cart-total-row">
        <span class="cart-total-label">Total do pedido</span>
        <span class="cart-total-value" id="cartTotalValue">R$ 0,00</span>
      </div>
      <button class="btn-order-wa" id="btnOrderWa" aria-label="Enviar pedido pelo WhatsApp">
        <i class="fab fa-whatsapp" aria-hidden="true"></i>
        Enviar pedido pelo WhatsApp
      </button>
    </div>
  </aside>

  <!-- ═══════════════════════════════
       FAB CARRINHO (flutuante)
  ═══════════════════════════════ -->
  <button class="fab-cart" id="fabCart" aria-label="Abrir carrinho">
    <i class="fas fa-bag-shopping" aria-hidden="true"></i>
    <span class="fab-cart-count" id="fabCartCount">0 itens</span>
  </button>

  <!-- Toast de feedback -->
  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- ═══════════════════════════════
       SR-ONLY
  ═══════════════════════════════ -->
  <span class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">
    Cardápio digital da Flor de Lótus Culinária Oriental — Cajazeiras, PB
  </span>

  <!-- App -->
  <script src="./pwa-patch.js"></script>
  <script src="./app.js"></script>

</body>
</html>
